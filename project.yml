name: honne
options:
  bundleIdPrefix: com.honne
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupOrdering:
    - order: [App, Models, Services, Utils, ViewModels, Views]

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.tomoyaokubo.honne
    DEVELOPMENT_TEAM: ""        # Xcode で自動署名設定後に入力
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1" # iPhone のみ
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: honne/Info.plist
    CODE_SIGN_STYLE: Automatic
    # リリースビルド最適化
    SWIFT_COMPILATION_MODE[config:Release]: wholemodule
    SWIFT_OPTIMIZATION_LEVEL[config:Release]: "-O"
    SWIFT_OPTIMIZATION_LEVEL[config:Debug]: "-Onone"
    SWIFT_ACTIVE_COMPILATION_CONDITIONS[config:Debug]: DEBUG

targets:
  honne:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: honne
        excludes:
          - "**/*.md"
    resources:
      - path: honne/Assets.xcassets
        optional: true
    info:
      path: honne/Info.plist
      properties:
        CFBundleDisplayName: honne
        CFBundleName: honne
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        # Privacy Usage Descriptions
        NSMicrophoneUsageDescription: "音声入力機能で使用します（v1.1以降）"
        NSUserTrackingUsageDescription: "より良いサービス提供のために使用します"
        NSFaceIDUsageDescription: "セキュアなデータ保護のために使用します"
        # App Transport Security
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomoyaokubo.honne
    scheme:
      testTargets:
        - honneTests
      gatherCoverageData: true

  honneTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: honneTests
        optional: true
    dependencies:
      - target: honne
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomoyaokubo.honneTests
